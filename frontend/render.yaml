services:
  - type: web
    name: police-intel-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run preview -- --host 0.0.0.0 --port $PORT
    envVars:
      - key: VITE_API_BASE
        value: https://your-backend.onrender.com
      - key: NODE_VERSION
        value: 20


