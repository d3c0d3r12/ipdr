services:
  - type: web
    name: police-intel-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11

